<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta id="meta-theme" name="theme-color" content="#0e0e0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mines">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Mines</title>
</head>
<body>
  <div id="app">

    <!-- ── Header ──────────────────────────────────────────────────────── -->
    <header>
      <div id="stat-mines" class="stat">
        <!-- bomb SVG injected by JS -->
        <span id="mines-left">10</span>
      </div>
      <div id="stat-timer" class="stat stat-center">
        <span id="timer-val">0.00</span>
        <small>s</small>
      </div>
      <div class="header-right">
        <button id="gear-btn"  aria-label="Settings"></button>
        <button id="theme-btn" aria-label="Toggle theme"></button>
      </div>
    </header>

    <!-- ── Board ────────────────────────────────────────────────────────── -->
    <main id="main">
      <div id="board-wrap">
        <div id="board"></div>
      </div>
    </main>

    <!-- ── Draggable flag FAB ─────────────────────────────────────────── -->
    <div id="flag-fab" aria-label="Toggle flag mode" role="button" tabindex="0">
      <div id="fab-icon"></div>
    </div>

    <!-- ── Win / Lose overlay ─────────────────────────────────────────── -->
    <div id="overlay" class="hidden" role="dialog" aria-modal="true">
      <div class="ov-card">
        <div id="ov-emoji"></div>
        <h2 id="ov-title"></h2>
        <p  id="ov-sub"></p>
        <button id="ov-btn">Play Again</button>
      </div>
    </div>

    <!-- ── Settings sheet ─────────────────────────────────────────────── -->
    <div id="sheet-backdrop"></div>
    <div id="settings-sheet" role="dialog" aria-label="Settings">
      <div id="sheet-handle"></div>
      <div class="sheet-body">

        <div class="sheet-section">
          <p class="sheet-label">Difficulty</p>
          <nav class="diff-group">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn"        data-diff="medium">Med</button>
            <button class="diff-btn"        data-diff="hard">Hard</button>
            <button class="diff-btn"        data-diff="extreme">Ext</button>
          </nav>
        </div>

        <button id="new-game-btn">New Game</button>

        <div class="sheet-section">
          <div class="score-header-row">
            <p class="sheet-label">Best Times</p>
            <div class="score-io">
              <button id="export-btn" class="io-btn" title="Export scores">
                <!-- export SVG injected -->
              </button>
              <label class="io-btn" id="import-label" title="Import scores">
                <input type="file" id="import-input" accept=".json">
                <!-- import SVG injected -->
              </label>
            </div>
          </div>
          <div id="scoreboard"></div>
        </div>

        <div class="sheet-section">
          <p class="sheet-label">Win Rate</p>
          <div id="game-stats"></div>
        </div>

        <div class="sheet-section sheet-theme-row">
          <p class="sheet-label" style="margin-bottom:0">Light Mode</p>
          <label class="ftoggle" aria-label="Light mode">
            <input type="checkbox" id="theme-toggle" role="switch">
            <span class="ttrack"><span class="tthumb"></span></span>
          </label>
        </div>

      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
